security:
    password_hashers:
        App\Identity\Domain\User: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Identity\Domain\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: app_home
            logout:
                path: app_logout

    access_control:
        - { path: ^/profile, roles: ROLE_USER }
        - { path: ^/pages/new, roles: ROLE_USER }
        - { path: ^/pages/.+/edit, roles: ROLE_USER }
        - { path: ^/pages/.+/revisions/\d+/restore, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            App\Identity\Domain\User:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
