security:
    password_hashers:
        App\Identity\Domain\User: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Identity\Domain\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            entry_point: App\Shared\Security\ApiAuthenticationEntryPoint
            access_denied_handler: App\Shared\Security\ApiAccessDeniedHandler
            json_login:
                check_path: api_login
                username_path: email
                password_path: password
            logout:
                path: api_logout

    access_control:
        - { path: ^/api/profile, roles: ROLE_USER }
        - { path: ^/api/logout, roles: ROLE_USER }
        - { path: ^/api/quick-create, roles: ROLE_USER }
        - { path: ^/api/pages$, roles: ROLE_USER, methods: [POST] }
        - { path: ^/api/pages/.+/editor$, roles: ROLE_USER }
        - { path: ^/api/pages/.+$, roles: ROLE_USER, methods: [PUT, PATCH] }

when@test:
    security:
        password_hashers:
            App\Identity\Domain\User:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
