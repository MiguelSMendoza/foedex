services:
  app:
    build:
      context: .
      target: app_prod
    volumes:
      - uploads_data:/var/www/html/public/uploads
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}

  worker:
    build:
      context: .
      target: app_prod
    command: php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}

  web:
    volumes:
      - uploads_data:/var/www/html/public/uploads
    ports:
      - "80:80"

  db:
    environment:
      MYSQL_DATABASE: foedex
      MYSQL_USER: foedex
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

volumes:
  uploads_data:
