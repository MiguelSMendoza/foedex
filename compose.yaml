services:
  app:
    build:
      context: .
      target: app_prod
    working_dir: /var/www/html
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET:-dev-secret-change-me}
      DATABASE_URL: ${DATABASE_URL:-mysql://foedex:foedex@db:3306/foedex?serverVersion=8.4.0&charset=utf8mb4}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-doctrine://default?auto_setup=0}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    depends_on:
      - app

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: foedex
      MYSQL_USER: foedex
      MYSQL_PASSWORD: foedex
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - db_data:/var/lib/mysql

  worker:
    build:
      context: .
      target: app_prod
    working_dir: /var/www/html
    command: php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET:-dev-secret-change-me}
      DATABASE_URL: ${DATABASE_URL:-mysql://foedex:foedex@db:3306/foedex?serverVersion=8.4.0&charset=utf8mb4}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-doctrine://default?auto_setup=0}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
