services:
  app:
    build:
      context: .
      target: app_dev
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: dev
      APP_SECRET: dev-secret-change-me
      DATABASE_URL: mysql://foedex:foedex@db:3306/foedex?serverVersion=8.4.0&charset=utf8mb4
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
    depends_on:
      db:
        condition: service_healthy

  web:
    image: nginx:1.29-alpine
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: foedex
      MYSQL_USER: foedex
      MYSQL_PASSWORD: foedex
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - db_data:/var/lib/mysql

  worker:
    build:
      context: .
      target: app_dev
    working_dir: /var/www/html
    command: php bin/console messenger:consume async -vv
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: dev
      APP_SECRET: dev-secret-change-me
      DATABASE_URL: mysql://foedex:foedex@db:3306/foedex?serverVersion=8.4.0&charset=utf8mb4
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
